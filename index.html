// ── STATE ─────────────────────────────────────────────────────────
var nodes={};  // id -> {id,label,level,x,y,parentId, data?}
var selected=null;
var dropTarget=null;  // during speaker drag

// ── LAYOUT ────────────────────────────────────────────────────────
function buildLayout(){
  nodes={};
  var N=TRACKS.length;
  nodes[1]={id:1,label:'beyond economy\nFestival 2026',level:'root',x:0,y:0,parentId:null,data:null};

  TRACKS.forEach(function(tr,ti){
    var ta=(ti/N)*2*Math.PI - Math.PI/2;
    var tx=Math.cos(ta)*R_TRACK, ty=Math.sin(ta)*R_TRACK;
    nodes[tr.id]={id:tr.id,label:tr.label,level:'track',x:tx,y:ty,parentId:1,data:{sub:tr.sub,focus:tr.focus}};

    // Topics
    var Nt=tr.topics.length;
    tr.topics.forEach(function(tp,fi){
      var spread=Nt>1?TOPIC_FAN:0;
      var fa=ta+(fi-(Nt-1)/2)*(spread/Math.max(Nt-1,1));
      nodes[tp.id]={id:tp.id,label:tp.label,level:'topic',
        x:Math.cos(fa)*R_TOPIC, y:Math.sin(fa)*R_TOPIC,
        parentId:tr.id,data:{sub:tp.sub,pitch:tp.pitch,lf:tp.lf}};
    });

    // Speakers – fan around track angle at R_SPEAKER
    var Ns=tr.speakers.length;
    tr.speakers.forEach(function(sp,si){
      var spread=Ns>1?SPEAKER_FAN:0;
      var sa=ta+(si-(Ns-1)/2)*(spread/Math.max(Ns-1,1));
      nodes[sp.id]={id:sp.id,label:sp.label,level:'speaker',
        x:Math.cos(sa)*R_SPEAKER, y:Math.sin(sa)*R_SPEAKER,
        parentId:tr.id,
        data:{role:sp.role,desc:sp.desc,formats:sp.formats,board:sp.board,nohonorar:sp.nohonorar,woman:sp.woman}};
    });
  });
}

// ── PAN/ZOOM ───────────────────────────────────────────────────────
var canvas=document.getElementById('canvas');
var world=document.getElementById('world');
var vx=0,vy=0,vz=1;
var panning=false,px0=0,py0=0,pvx=0,pvy=0;
var isDraggingNode=false,dragId=null,dox=0,doy=0;
var lastMX=0,lastMY=0;

function applyT(){world.setAttribute('transform','translate('+vx+','+vy+') scale('+vz+')');}
function toSVG(cx,cy){
  var r=canvas.getBoundingClientRect();
  return{x:(cx-r.left-vx)/vz, y:(cy-r.top-vy)/vz};
}
function centerView(){
  var det=document.getElementById('detail');
  var dw=det.classList.contains('open')?340:0;
  vx=(window.innerWidth-dw)/2; vy=window.innerHeight/2+20; vz=0.22;
  applyT();
}

canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=canvas.getBoundingClientRect();
  var mx=e.clientX-r.left, my=e.clientY-r.top;
  var f=e.deltaY<0?1.11:0.90;
  var nz=Math.max(0.04,Math.min(8,vz*f));
  vx=mx-(mx-vx)*nz/vz; vy=my-(my-vy)*nz/vz; vz=nz; applyT();
},{passive:false});

document.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  if(e.target===canvas||e.target===world||
     e.target.id==='gL'||e.target.id==='gN'){
    panning=true;px0=e.clientX;py0=e.clientY;pvx=vx;pvy=vy;
    canvas.classList.add('panning');
  }
});
document.addEventListener('mousemove',function(e){
  lastMX=e.clientX; lastMY=e.clientY;
  if(isDraggingNode&&dragId!=null){
    var pt=toSVG(e.clientX,e.clientY);
    nodes[dragId].x=pt.x-dox; nodes[dragId].y=pt.y-doy;
    // Find closest valid drop target if dragging a speaker
    if(nodes[dragId].level==='speaker'){
      dropTarget=findDropTarget(pt.x,pt.y,dragId);
      showDropMsg(dropTarget);
    }
    render(); return;
  }
  if(panning){vx=pvx+(e.clientX-px0);vy=pvy+(e.clientY-py0);applyT();}
});
document.addEventListener('mouseup',function(e){
  if(isDraggingNode&&dragId!=null&&nodes[dragId]&&nodes[dragId].level==='speaker'){
    if(dropTarget!=null){
      // Reparent the speaker
      nodes[dragId].parentId=dropTarget;
      // Move to nice position near new parent
      var p=nodes[dropTarget];
      var ang=Math.atan2(p.y,p.x);
      var dist=p.level==='topic'?250:350;
      nodes[dragId].x=p.x+Math.cos(ang+0.2)*dist;
      nodes[dragId].y=p.y+Math.sin(ang+0.2)*dist;
    }
    dropTarget=null; showDropMsg(null);
    render();
  }
  isDraggingNode=false;dragId=null;
  panning=false; canvas.classList.remove('panning');
});

function findDropTarget(sx,sy,excludeId){
  var best=null, bestD=140; // snap radius in SVG coords
  Object.values(nodes).forEach(function(n){
    if(n.id===excludeId) return;
    if(n.level==='root'||n.level==='speaker') return;
    var d=Math.sqrt((n.x-sx)*(n.x-sx)+(n.y-sy)*(n.y-sy));
    if(d<bestD){bestD=d;best=n.id;}
  });
  return best;
}
function showDropMsg(targetId){
  var el=document.getElementById('dropmsg');
  if(targetId!=null&&nodes[targetId]){
    el.style.display='block';
    el.textContent='→ Ablegen bei: '+nodes[targetId].label.replace(/\n/g,' ');
  } else {
    el.style.display='none';
  }
}

// ── SVG HELPERS ───────────────────────────────────────────────────
var NS='http://www.w3.org/2000/svg';
function E(tag,a){var e=document.createElementNS(NS,tag);for(var k in a)e.setAttribute(k,a[k]);return e;}
function initials(name){
  var p=name.split(/[\s\n]+/).filter(function(w){return w.length>1&&['Dr.','Prof.','Ex-','&'].indexOf(w)<0;});
  return((p[0]||'?')[0]+(p[1]?p[1][0]:'')).toUpperCase();
}

// ── RENDER ────────────────────────────────────────────────────────
var renderThrottle=null;
function render(){
  if(renderThrottle)cancelAnimationFrame(renderThrottle);
  renderThrottle=requestAnimationFrame(_render);
}
function _render(){
  var gL=document.getElementById('gL'); gL.innerHTML='';
  var gNd=document.getElementById('gN'); gNd.innerHTML='';

  // Links
  Object.values(nodes).forEach(function(n){
    if(!n.parentId)return;
    var p=nodes[n.parentId]; if(!p)return;
    var isDropTgt=(n.id===dropTarget);
    var sw=n.level==='track'?2.8:n.level==='topic'?1.8:1;
    var op=isDropTgt?0.8:0.28;
    var line=E('line',{x1:p.x,y1:p.y,x2:n.x,y2:n.y,
      stroke:isDropTgt?'#82ff00':COL[n.level],'stroke-width':isDropTgt?2.5:sw,'stroke-opacity':op});
    gL.appendChild(line);
  });

  // Nodes (sorted: root & tracks on top)
  var arr=Object.values(nodes).sort(function(a,b){
    var o={root:3,track:2,topic:1,speaker:0};return(o[a.level]||0)-(o[b.level]||0);});

  arr.forEach(function(n){
    var r=RAD[n.level];
    var isSel=selected===n.id;
    var isDT=n.id===dropTarget;
    var g=E('g',{transform:'translate('+n.x+','+n.y+')',style:'cursor:pointer'});

    // Drop target glow
    if(isDT){
      g.appendChild(E('circle',{r:r+14,fill:'#82ff00',opacity:0.15,filter:'url(#glow)'}));
      g.appendChild(E('circle',{r:r+10,fill:'none',stroke:'#82ff00','stroke-width':2,opacity:0.8}));
    }
    // Selection ring
    if(isSel&&!isDT){
      g.appendChild(E('circle',{r:r+9,fill:'none',stroke:COL[n.level],'stroke-width':2,'stroke-dasharray':'6 3',opacity:0.85}));
    }
    // Body
    g.appendChild(E('circle',{r:r,fill:BG[n.level],stroke:isDT?'#82ff00':COL[n.level],'stroke-width':isSel||isDT?2.5:2}));

    // Board badge (small outer arc indicator)
    if(n.level==='speaker'&&n.data&&n.data.board){
      g.appendChild(E('circle',{r:r+3,fill:'none',stroke:'#aa78f0','stroke-width':2,
        'stroke-dasharray':(2*Math.PI*(r+3)*0.5)+' '+(2*Math.PI*(r+3)*0.5),
        'stroke-dashoffset':0,opacity:0.6}));
    }

    // Text (white, black shadow)
    var lines=n.label.split('\n').filter(Boolean);
    var fs=n.level==='root'?14:n.level==='track'?11.5:n.level==='topic'?9.5:8.5;
    var lh=fs*1.42;
    var sy=-(lines.length-1)*lh/2;
    lines.forEach(function(line,j){
      // Shadow
      var ts=E('text',{x:0,y:sy+j*lh,'text-anchor':'middle','dominant-baseline':'middle',
        fill:'none',stroke:'rgba(0,0,0,0.95)','stroke-width':3.5,'stroke-linejoin':'round',
        'font-size':fs,'font-weight':n.level==='root'||n.level==='track'?700:500,
        'font-family':'system-ui,sans-serif','pointer-events':'none'});
      ts.textContent=line; g.appendChild(ts);
      // White text
      var t=E('text',{x:0,y:sy+j*lh,'text-anchor':'middle','dominant-baseline':'middle',
        fill:'#ffffff','font-size':fs,
        'font-weight':n.level==='root'||n.level==='track'?700:500,
        'font-family':'system-ui,sans-serif','pointer-events':'none'});
      t.textContent=line; g.appendChild(t);
    });

    // Events
    g.addEventListener('mousedown',function(e){
      if(e.button!==0)return; e.stopPropagation();
      selected=n.id;
      var pt=toSVG(e.clientX,e.clientY);
      isDraggingNode=true; dragId=n.id; dox=pt.x-n.x; doy=pt.y-n.y;
      render(); showDetail(n);
    });
    g.addEventListener('dblclick',function(e){e.stopPropagation();selected=n.id;startEdit();});
    g.addEventListener('contextmenu',function(e){
      e.preventDefault();e.stopPropagation();
      if(n.level==='root')return;
      if(confirm('"'+n.label.replace(/\n/g,' ')+'" löschen?'))delNode(n.id);
    });
    gNd.appendChild(g);
  });
}

canvas.addEventListener('click',function(e){
  if(e.target===canvas||e.target===world||e.target.id==='gL'||e.target.id==='gN'){
    selected=null; render();

// ── MODAL ─────────────────────────────────────────────────────────
var mcb=null;
function openModal(lbl,val,cb){
  document.getElementById('mlbl').textContent=lbl;
  document.getElementById('minp').value=(val||'').replace(/\n/g,'\\n');
  document.getElementById('modal').style.display='flex';
  mcb=cb;
  setTimeout(function(){var i=document.getElementById('minp');i.focus();i.select();},40);
}
function closeModal(){document.getElementById('modal').style.display='none';mcb=null;}
function confirmModal(){
  var v=document.getElementById('minp').value.trim().replace(/\\n/g,'\n');
  if(mcb)mcb(v); closeModal();
}
document.getElementById('minp').addEventListener('keydown',function(e){
  if(e.key==='Enter')confirmModal();
  if(e.key==='Escape')closeModal();
});

// ── CRUD ──────────────────────────────────────────────────────────
function startEdit(){
  if(!selected)return;
  var n=nodes[selected];
  openModal(LNAMES[n.level]+' umbenennen (\\n = neue Zeile)',n.label,function(v){
    if(v){nodes[selected].label=v;} render();
    if(nodes[selected])showDetail(nodes[selected]);
  });
}
function addChild(){
  var pid=selected;
  if(!pid){var r=Object.values(nodes).find(function(x){return x.level==='root';});if(r)pid=r.id;}
  if(!pid)return;
  var p=nodes[pid]; var li=LEVELS.indexOf(p.level);
  if(li>=LEVELS.length-1){alert('Speaker können keine Kinder haben.');return;}
  var cl=LEVELS[li+1]; var id=nid();
  openModal('Neuen '+LNAMES[cl]+' benennen (\\n = neue Zeile)','',function(v){
    if(!v)return;
    nodes[id]={id:id,label:v,level:cl,x:p.x+(Math.random()-.5)*200,y:p.y+(Math.random()-.5)*200,parentId:pid,data:{}};
    selected=id; render(); if(nodes[id])showDetail(nodes[id]);
  });
}
function delSelected(){if(selected)delNode(selected);}
function delNode(id){
  if(!id||!nodes[id]||nodes[id].level==='root')return;
  var rm=[];
  function gather(nid){rm.push(nid);Object.values(nodes).forEach(function(n){if(n.parentId===nid)gather(n.id);});}
  gather(id);
  rm.forEach(function(i){delete nodes[i];});
  if(rm.indexOf(selected)>=0){selected=null;closeDetail();}
  render();
}

// ── TOOLBAR ───────────────────────────────────────────────────────
function doZoom(f){
  var nz=Math.max(0.04,Math.min(8,vz*f));
  vx=window.innerWidth/2-(window.innerWidth/2-vx)*nz/vz;
  vy=window.innerHeight/2-(window.innerHeight/2-vy)*nz/vz;
  vz=nz; applyT();
}
function doSave(){
  // Serialize: only position, parentId, label (data comes from source)
  var save={}; Object.values(nodes).forEach(function(n){
    save[n.id]={id:n.id,label:n.label,level:n.level,x:n.x,y:n.y,parentId:n.parentId};
  });
  localStorage.setItem('be_mm7',JSON.stringify(save));
  var b=document.getElementById('btnSave');b.textContent='✓ Gespeichert';
  setTimeout(function(){b.textContent='💾 Speichern';},2000);
}
function doLoad(){
  try{
    var s=localStorage.getItem('be_mm7');
    if(!s){alert('Kein gespeicherter Stand.');return;}
    var save=JSON.parse(s);
    // Merge saved positions/parentIds back into full nodes
    buildLayout(); // rebuild with all data
    Object.values(save).forEach(function(sv){
      if(nodes[sv.id]){
        nodes[sv.id].x=sv.x; nodes[sv.id].y=sv.y;
        nodes[sv.id].parentId=sv.parentId;
        nodes[sv.id].label=sv.label;
      }
    });
    selected=null;closeDetail();render();
  }catch(e){alert('Fehler beim Laden.');}
}
function doReset(){
  if(confirm('Auf Ausgangsdaten zurücksetzen? Alle Verschiebungen gehen verloren.')){
    buildLayout();selected=null;closeDetail();centerView();render();
  }
}

document.addEventListener('keydown',function(e){
  if(document.getElementById('modal').style.display!=='none')return;
  if(e.key==='+'||e.key==='=')doZoom(1.2);
  if(e.key==='-')doZoom(0.82);
  if(e.key==='Escape'){selected=null;closeDetail();render();}
  if(e.key==='Delete'&&selected)delSelected();
  if(e.key==='F2'&&selected)startEdit();
});

  canvas.setAttribute('width',window.innerWidth);canvas.setAttribute('height',window.innerHeight);
});

function openSpeakerModal(){
  // Populate parent dropdown: all tracks + all topics
  var sel=document.getElementById('spParent');
  sel.innerHTML='';
  // Tracks first
  var tracks=Object.values(nodes).filter(function(n){return n.level==='track';});
  tracks.sort(function(a,b){return a.id-b.id;});
  var grpTrack=document.createElement('optgroup');
  grpTrack.label='── Fokusthemen (Track)';
  tracks.forEach(function(t){
    var o=document.createElement('option');
    o.value=t.id;
    o.textContent=t.label.replace(/\n/g,' – ');
    // Pre-select if currently selected node is track or topic
    if(selected===t.id||(nodes[selected]&&nodes[selected].parentId===t.id)) o.selected=true;
    grpTrack.appendChild(o);
  });
  sel.appendChild(grpTrack);
  // Topics grouped under their track
  tracks.forEach(function(t){
    var topics=Object.values(nodes).filter(function(n){return n.level==='topic'&&n.parentId===t.id;});
    if(!topics.length)return;
    var grp=document.createElement('optgroup');
    grp.label='  '+t.label.replace(/\n/g,' ');
    topics.sort(function(a,b){return a.id-b.id;});
    topics.forEach(function(tp){
      var o=document.createElement('option');
      o.value=tp.id;
      o.textContent='    '+tp.label.replace(/\n/g,' – ');
      if(selected===tp.id) o.selected=true;
      grp.appendChild(o);
    });
    sel.appendChild(grp);
  });
  // Reset form
  document.getElementById('spName').value='';
  document.getElementById('spOrg').value='';
  document.getElementById('spRole').value='';
  document.getElementById('spDesc').value='';
  document.getElementById('spFormats').value='';
  document.getElementById('spBoard').checked=false;
  document.getElementById('spNoHonorar').checked=true;
  document.getElementById('spWoman').checked=false;
  document.getElementById('spModal').style.display='flex';
  setTimeout(function(){document.getElementById('spName').focus();},60);
}

function closeSpeakerModal(){
  document.getElementById('spModal').style.display='none';
}

function confirmSpeakerModal(){
  var name=document.getElementById('spName').value.trim();
  if(!name){document.getElementById('spName').focus();return;}
  var org=document.getElementById('spOrg').value.trim();
  var role=document.getElementById('spRole').value.trim();
  var desc=document.getElementById('spDesc').value.trim();
  var formats=document.getElementById('spFormats').value.trim();
  var parentId=parseInt(document.getElementById('spParent').value,10);
  var board=document.getElementById('spBoard').checked;
  var nohonorar=document.getElementById('spNoHonorar').checked;
  var woman=document.getElementById('spWoman').checked;

  if(!parentId||!nodes[parentId]){alert('Bitte Zuordnung wählen.');return;}

  var label=org?name+'\n'+org:name;
  var p=nodes[parentId];
  // Position near parent, slightly outward
  var ang=Math.atan2(p.y,p.x);
  var baseDist=p.level==='track'?R_SPEAKER:R_SPEAKER+80;
  // Fan out from existing siblings
  var siblings=Object.values(nodes).filter(function(n){return n.level==='speaker'&&n.parentId===parentId;});
  var offset=(siblings.length-(siblings.length>0?1:0))*0.08;
  var id=nid();
  nodes[id]={
    id:id, label:label, level:'speaker',
    x:Math.cos(ang+offset)*baseDist,
    y:Math.sin(ang+offset)*baseDist,
    parentId:parentId,
    data:{role:role||name,desc:desc||'Neu hinzugefügter Speaker.',formats:formats||'—',board:board,nohonorar:nohonorar,woman:woman}
  };
  selected=id;
  closeSpeakerModal();
  render();
  showDetail(nodes[id]);
}

document.getElementById('spModal').addEventListener('keydown',function(e){
  if(e.key==='Escape')closeSpeakerModal();
  if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))confirmSpeakerModal();
});

(function(){
  canvas.setAttribute('width',window.innerWidth);
  canvas.setAttribute('height',window.innerHeight);
  buildLayout();
  centerView();
  render();
})();
</script>
</body>
